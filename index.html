// ── 반복 듣기 ────────────────────────────────────────
// 전역 반복듣기 상태 (버튼별 독립 관리 + 안전한 종료)
let _rlStopFlags = {};  // { btnElId: boolean }
let _rlKeepAliveTimer = null; // Chrome speechSynthesis 버그 우회용

// Chrome은 5초 이상 idle 상태에서 speak를 호출하면 무시하는 버그가 있음
// → 주기적으로 pause/resume을 호출해 엔진을 깨워둠
function _rlEnsureEngineAwake(){
  if(_rlKeepAliveTimer) return;
  _rlKeepAliveTimer = setInterval(()=>{
    if(window.speechSynthesis.speaking){
      window.speechSynthesis.pause();
      window.speechSynthesis.resume();
    }
  }, 4000);
}
function _rlStopEngineKeepAlive(){
  if(_rlKeepAliveTimer){ clearInterval(_rlKeepAliveTimer); _rlKeepAliveTimer=null; }
}

function startRepeatListen(btn){
  if(!btn) return;
  const btnId = btn.id || ('rl_'+Math.random().toString(36).slice(2));
  if(!btn.id) btn.id = btnId;

  // 이미 재생 중이면 중지 토글
  if(_rlStopFlags[btnId] === false){
    _rlStopFlags[btnId] = true; // 중지 신호
    window.speechSynthesis.cancel();
    _rlStopEngineKeepAlive();
    return;
  }

  const text = btn.dataset.text, tts = btn.dataset.tts, card = btn.dataset.card;
  if(!text){ showToast('읽을 텍스트가 없습니다'); console.warn('[반복듣기] text 없음', btn); return; }
  const total = getRepeatCount(card);
  console.log('[반복듣기 시작]', {text, tts, card, total});
  let count = 0;

  _rlStopFlags[btnId] = false; // 재생 중
  const origLabel = btn.dataset.origLabel || btn.textContent;
  btn.dataset.origLabel = origLabel;
  btn.textContent = '⏹ 중지';
  btn.classList.add('recording');
  _rlEnsureEngineAwake();

  const finish = ()=>{
    _rlStopFlags[btnId] = true;
    btn.textContent = origLabel;
    btn.classList.remove('recording');
    _rlStopEngineKeepAlive();
  };

  const speakOnce = (onDone)=>{
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = tts; utt.rate = 0.85; utt.pitch = 1.0; utt.volume = 1.0;
    const vs = window.speechSynthesis.getVoices();
    const voice = vs.find(v=>v.lang===tts) || vs.find(v=>v.lang.startsWith((tts||'en').split('-')[0])) || vs[0];
    if(voice) utt.voice = voice;

    let doneFired = false;
    const safeDone = ()=>{ if(doneFired) return; doneFired=true; clearTimeout(backupTimer); onDone(); };

    utt.onend   = safeDone;
    utt.onerror = safeDone;
    // onend가 누락되는 경우를 대비한 타이머 백업
    const estMs = Math.max(900, text.length * 220);
    const backupTimer = setTimeout(safeDone, estMs + 1500);

    try{
      window.speechSynthesis.speak(utt);
      // speak 호출 후 실제로 speaking 상태가 안 되면(엔진 멈춤) 강제 재시도
      setTimeout(()=>{
        if(!doneFired && !window.speechSynthesis.speaking && !window.speechSynthesis.pending){
          try{ window.speechSynthesis.speak(utt); }catch(e){}
        }
      }, 250);
    }catch(e){ safeDone(); }
  };

  const play = ()=>{
    if(_rlStopFlags[btnId] || count >= total){ finish(); return; }
    count++;
    const prog = document.getElementById('rp_'+card);
    if(prog) prog.textContent = count+'/'+total;
    // cancel 후 즉시 speak하면 일부 브라우저에서 무시되므로 짧은 지연
    window.speechSynthesis.cancel();
    setTimeout(()=>{
      if(_rlStopFlags[btnId]){ finish(); return; }
      speakOnce(()=>{
        if(_rlStopFlags[btnId]){ finish(); return; }
        setTimeout(play, 500);
      });
    }, 80);
  };

  // 음성 목록이 비어있으면 로드 후 시작 (Chrome 초기 로딩 이슈 대응)
  if(window.speechSynthesis.getVoices().length === 0){
    window.speechSynthesis.onvoiceschanged = ()=>{
      window.speechSynthesis.onvoiceschanged = null;
      play();
    };
    window.speechSynthesis.getVoices();
    setTimeout(()=>{ if(_rlStopFlags[btnId]===false && count===0) play(); }, 300);
  } else {
    play();
  }
}

// ── 반복 말하기 ──────────────────────────────────────
function startRepeatSpeak(btn){
  const btnId=btn.id, text=btn.dataset.text, tts=btn.dataset.tts, card=btn.dataset.card;
  if(_rspActive&&_rspBtnId===btnId){ stopRepeatSpeak(); return; }
  if(_rspActive) stopRepeatSpeak();

  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ showToast('음성인식 미지원 — Chrome 권장'); return; }
  if(location.protocol==='file:'){ showToast('⚠️ Netlify에 올려서 사용하세요'); return; }

  _rspTotal=getRepeatCount(card);
  _rspCount=0; _rspScores=[]; _rspBtnId=btnId; _rspActive=true;
  btn.classList.add('recording'); btn.textContent='⏹ 중지';

  const fbEl=document.getElementById('sf_'+card);
  if(fbEl){ fbEl.className='speak-feedback show sfb-ok'; fbEl.innerHTML='🎤 말하기 준비 중...'; }

  // 주파수 패널 추가
  const cardEl=btn.closest('.wlang-card,.wlang-sentence');
  if(cardEl&&cardEl.id){ addFreqPanel(cardEl.id,tts); startFreqAnalysis(cardEl.id,tts); }

  const doListen=()=>{
    if(!_rspActive||_rspCount>=_rspTotal){ finishRepeatSpeak(card,text); return; }
    const prog=document.getElementById('rp_'+card);
    if(prog) prog.textContent=(_rspCount+1)+'/'+_rspTotal;

    _rspRec=new SR();
    _rspRec.lang=tts; _rspRec.interimResults=false; _rspRec.maxAlternatives=8;

    let _gotResult=false;
    _rspRec.onresult=e=>{
      _gotResult=true;
      const results=Array.from(e.results[0]).map(x=>x.transcript.trim());
      const best=results[0]||'';
      if(!best){ setTimeout(doListen,400); return; }

      // 비라틴 처리
      const isNL=/[^\u0000-\u007F]/.test(text)&&!/[a-zA-Z]/.test(text);
      const compareText=isNL?(text):text;
      const detail=calcPronDetail(compareText,best,tts);
      _rspScores.push({round:_rspCount+1,said:best,score:detail.score,detail});
      _rspCount++;

      const fbEl2=document.getElementById('sf_'+card);
      if(fbEl2){
        const {html,cls}=makePronFeedback(detail,text,best,_rspCount,_rspTotal);
        fbEl2.className='speak-feedback show '+cls;
        fbEl2.innerHTML=html;
      }
      setTimeout(doListen,800);
    };
    _rspRec.onerror=e=>{
      if(e.error==='no-speech'){ setTimeout(doListen,500); }
      else stopRepeatSpeak();
    };
    _rspRec.onend=()=>{
      if(!_gotResult&&_rspActive) setTimeout(doListen,400);
    };
    _rspRec.start();
  };

  doListen();
}

function stopRepeatSpeak(){
  _rspActive=false;
  if(_rspRec){try{_rspRec.stop();}catch(e){}_rspRec=null;}
  if(_rspBtnId){
    const b=document.getElementById(_rspBtnId);
    if(b){b.classList.remove('recording');b.textContent='🎤 말하기';}
    _rspBtnId=null;
  }
  stopFreqAnalysis();
}

// 반복 말하기 목표 횟수 완료 시 종합 결과 표시
function finishRepeatSpeak(card, text){
  const scores = _rspScores.slice();
  const avg = scores.length
    ? Math.round(scores.reduce((s,x)=>s+x.score,0)/scores.length)
    : 0;
  const grade = avg>=85 ? '상' : avg>=60 ? '중' : '하';
  const gradeEmoji = grade==='상' ? '🟢' : grade==='중' ? '🟡' : '🔴';

  const fbEl = document.getElementById('sf_'+card);
  if(fbEl){
    fbEl.className = 'speak-feedback show ' + (avg>=85?'sfb-ok':avg>=60?'sfb-mid':'sfb-low');
    fbEl.innerHTML =
      '<div style="text-align:center">'+
        '<div style="font-size:18px;font-weight:900">'+gradeEmoji+' 완료! 평균 '+avg+'점 ('+grade+')</div>'+
        '<div style="font-size:10px;color:var(--text3);margin-top:4px">총 '+scores.length+'회 연습 완료</div>'+
      '</div>';
  }

  // 진행 표시도 완료로 갱신
  const prog = document.getElementById('rp_'+card);
  if(prog) prog.textContent = scores.length+'/'+_rspTotal+' 완료';

  showToast('🎉 "'+text+'" '+scores.length+'회 완료! 평균 '+avg+'점');

  // 상태 정리 (stopRepeatSpeak과 동일하게)
  _rspActive = false;
  if(_rspRec){ try{ _rspRec.stop(); }catch(e){} _rspRec=null; }
  if(_rspBtnId){
    const b = document.getElementById(_rspBtnId);
    if(b){ b.classList.remove('recording'); b.textContent='🎤 말하기'; }
    _rspBtnId = null;
  }
  stopFreqAnalysis();
}

// 언어별 인식결과 정규화 + 비교 함수
function checkMatch(results, char, rom, lang){
  const c = char.trim();
  const r = (rom||'').toLowerCase().trim();
  const rClean = r.replace(/[가-힣\/\s]+/g,'').replace(/[\[（(][^\]）)]*[\]）)]/g,'').trim().split(' ')[0];

  for(let raw of results){
    const t = raw.trim();
    if(!t) continue;

    // 1) 완전 일치
    if(t === c) return true;
    if(t.toLowerCase() === c.toLowerCase()) return true;

    // 2) 언어별 스마트 비교
    const tl = t.toLowerCase();
    switch(lang){
      case 'jp':{
        if(toHiragana(t)===toHiragana(c)) return true;
        if(toKatakana(t)===toKatakana(c)) return true;
        if(t.includes(c)||toHiragana(t).includes(toHiragana(c))) return true;
        if(rClean && (tl===rClean || tl.includes(rClean) || editDist(tl,rClean)<=1)) return true;
        break;
      }
      case 'cn':{
        const tc=stripTones(tl), rc=stripTones(rClean||r);
        if(tc===rc||tc.includes(rc)||rc.includes(tc)) return true;
        if(t.includes(c)||c.includes(t)) return true;
        if(rClean && editDist(tc,rc)<=1) return true;
        break;
      }
      case 'kanji':{
        if(t.includes(c)) return true;
        if(rClean && tl.includes(rClean.split('/')[0])) return true;
        break;
      }
      case 'en':{
        const cl=c.toLowerCase();
        if(tl===cl||tl.includes(cl)||cl.includes(tl)) return true;
        if(rClean && editDist(tl,rClean)<=1) return true;
        break;
      }
      case 'de':
      case 'fr':{
        const cl=c.toLowerCase();
        if(tl===cl||tl.includes(cl)) return true;
        if(rClean && (tl.includes(rClean)||editDist(tl,rClean)<=1)) return true;
        break;
      }
      case 'hi':
      case 'sa':{
        if(t.includes(c)||c.includes(t)) return true;
        if(rClean && (tl.includes(rClean)||editDist(tl,rClean)<=1)) return true;
        break;
      }
      case 'la':{
        const cl=c.toLowerCase();
        if(tl===cl||tl.includes(cl)||editDist(tl,cl)<=1) return true;
        if(rClean && editDist(tl,rClean)<=1) return true;
        break;
      }
      default:{
        if(t.includes(c)||c.includes(t)) return true;
        if(rClean && (tl.includes(rClean)||editDist(tl,rClean)<=1)) return true;
      }
    }
  }
  return false;
}

function calcPronDetail(original, said, lang){
  if(!said || !said.trim())
    return {score:0, grade:'하', accuracy:0, fluency:0, completeness:0, missing:[], extra:[], reason:'음성 미인식'};

  const clean = s => s.replace(/[\s。、.,!?！？「」『』【】\u3000]/g,'').toLowerCase();

  // ── 언어별 정규화 및 대조 대상 결정 ──────────────
  // 음성인식은 항상 로마자/한글/해당 언어 문자로 옴
  // → 원문이 비라틴(あ,ক,क...)이면 로마자 발음(r 필드)으로 비교

  let orig = clean(original);
  let s    = clean(said);

  // 히라가나/가타카나 정규화
  if(lang==='ja-JP'){
    orig = toHiragana(orig);
    s    = toHiragana(s);
  }
  // 중국어 성조 제거
  if(lang==='zh-CN'){
    orig = stripTones(orig);
    s    = stripTones(s);
  }

  // ── 한글 인식 → 영어 변환 테이블 ──────────────────
  const KO_TO_LANG = {
    '밸류':'value','벨류':'value','발류':'value','러브':'love',
    '타임':'time','하우스':'house','스쿨':'school','워터':'water',
    '프렌드':'friend','패밀리':'family','해피':'happy','뷰티풀':'beautiful',
    '월드':'world','피플':'people','스카이':'sky','나이트':'night',
    '데이':'day','북':'book','캣':'cat','독':'dog',
    '아':'a','이':'i','우':'u','에':'e','오':'o',
    '카':'ka','키':'ki','쿠':'ku','케':'ke','코':'ko',
    '가':'ga','기':'gi','구':'gu','게':'ge','고':'go',
    '사':'sa','시':'shi','스':'su','세':'se','소':'so',
    '자':'za','지':'ji','즈':'zu','제':'ze','조':'zo',
    '타':'ta','치':'chi','츠':'tsu','테':'te','토':'to',
    '다':'da','나':'na','니':'ni','누':'nu','네':'ne','노':'no',
    '하':'ha','히':'hi','후':'fu','헤':'he','호':'ho',
    '바':'ba','비':'bi','부':'bu','베':'be','보':'bo',
    '파':'pa','피':'pi','푸':'pu','페':'pe','포':'po',
    '마':'ma','미':'mi','무':'mu','메':'me','모':'mo',
    '야':'ya','유':'yu','요':'yo',
    '라':'ra','리':'ri','루':'ru','레':'re','로':'ro',
    '와':'wa','응':'n','앙':'ang','엉':'eng','옹':'ong',
    '아이':'ai','에이':'ei','아오':'ao','오우':'ou','안':'an','언':'en',
    '봉주르':'bonjour','메르시':'merci','나마스테':'namaste','요가':'yoga',
  };

  // 한글 인식된 경우 변환
  if(/[가-힣]/.test(s)){
    const mapped = KO_TO_LANG[s] || KO_TO_LANG[said.trim()];
    if(mapped) s = mapped;
  }

  // ── 즉시 판정 케이스 ────────────────────────────
  if(orig === s)
    return {score:100, grade:'상', accuracy:100, fluency:100, completeness:100, missing:[], extra:[]};

  // 포함 관계
  if(orig.includes(s) || s.includes(orig)){
    const ratio = Math.min(orig.length, s.length) / Math.max(orig.length, s.length);
    const sc = Math.round(82 + ratio*18);
    return {score:sc, grade:sc>=85?'상':'중', accuracy:sc, fluency:sc,
            completeness:Math.round(ratio*100), missing:[], extra:[]};
  }

  // 편집거리 1~2 → 거의 정확
  const dist = editDist(orig, s);
  if(dist <= 1)
    return {score:90, grade:'상', accuracy:90, fluency:90, completeness:90, missing:[], extra:[]};
  if(dist <= 2 && orig.length >= 3)
    return {score:78, grade:'중', accuracy:78, fluency:78, completeness:85, missing:[], extra:[]};

  // ── 문자 단위 정확도 ────────────────────────────
  const oArr=[...orig], sArr=[...s];
  const used=new Array(sArr.length).fill(false);
  let charMatch=0;
  const missing=[], extra=[];
  for(const oc of oArr){
    const fi=sArr.findIndex((sc,i)=>!used[i]&&sc===oc);
    if(fi>=0){charMatch++;used[fi]=true;}
    else missing.push(oc);
  }
  sArr.forEach((sc,i)=>{ if(!used[i]) extra.push(sc); });
  const accuracy = orig.length>0 ? Math.round(charMatch/orig.length*100) : 0;

  // ── 완성도 ──────────────────────────────────────
  const completeness = orig.length>0
    ? Math.min(100, Math.round(s.length/orig.length*100)) : 0;

  // ── 유창성 ──────────────────────────────────────
  const oWords=orig.split(/\s+/).filter(Boolean);
  const sWords=s.split(/\s+/).filter(Boolean);
  let fluency;
  if(oWords.length <= 1){
    fluency = Math.round((accuracy + Math.min(100, completeness))/2);
  } else {
    let wm=0;
    for(const ow of oWords)
      if(sWords.some(sw=>sw.includes(ow)||ow.includes(sw)||editDist(ow,sw)<=1)) wm++;
    fluency = Math.round(wm/oWords.length*100);
  }

  // ── 종합 ────────────────────────────────────────
  const score = Math.round(accuracy*0.5 + completeness*0.25 + fluency*0.25);
  const grade = score>=85?'상':score>=60?'중':'하';
  return {score, grade, accuracy, fluency, completeness, missing, extra};
}

// 편집 거리 (Levenshtein) — 발음 유사도 보조
function editDist(a, b){
  if(a===b) return 0;
  if(!a.length) return b.length;
  if(!b.length) return a.length;
  const dp=Array.from({length:a.length+1},(_,i)=>
    Array.from({length:b.length+1},(_,j)=>i||j));
  for(let i=1;i<=a.length;i++)
    for(let j=1;j<=b.length;j++)
      dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:
        1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[a.length][b.length];
}

// 상중하 피드백 HTML 생성
function makePronFeedback(detail, target, said, round, total){
  const {score,grade,accuracy,fluency,completeness,missing,extra} = detail;
  const gradeEmoji = grade==='상'?'🟢':grade==='중'?'🟡':'🔴';
  const gradeText = grade==='상'?'훌륭해요!':grade==='중'?'조금 더 연습하세요':'다시 도전하세요';
  const cls = grade==='상'?'sfb-good':grade==='중'?'sfb-ok':'sfb-bad';
  const barColor = grade==='상'?'#10b981':grade==='중'?'#f59e0b':'#ef4444';

  const makeBar = (label, val) =>
    '<div class="pron-bar-wrap">'+
    '<span class="pron-bar-label">'+label+'</span>'+
    '<div class="pron-bar"><div class="pron-bar-fill" style="width:'+val+'%;background:'+barColor+'"></div></div>'+
    '<span style="font-size:9px;color:var(--text3);width:28px;text-align:right">'+val+'%</span>'+
    '</div>';

  let feedback = '';
  // 헤더
  feedback += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">'+
    '<span class="pron-grade '+grade+'">'+gradeEmoji+' '+grade+'</span>'+
    '<span style="font-weight:700;font-size:12px">'+gradeText+'</span>'+
    (total>1?'<span style="margin-left:auto;font-size:10px;color:var(--text3)">'+round+'/'+total+'회</span>':'')+
    '</div>';

  // 점수 바
  feedback += '<div class="pron-detail">'+
    makeBar('정확도', accuracy)+
    makeBar('완성도', completeness)+
    makeBar('유창성', fluency)+
  '</div>';

  // 세부 피드백
  let tips = '';
  if(said) tips += '인식: <b>"'+esc(said)+'"</b><br>';
  if(accuracy < 70) tips += '🔤 목표: <b>'+esc(target)+'</b><br>';
  if(missing.length>0 && missing.length<=5)
    tips += '⚠️ 빠진 소리: <b>'+missing.slice(0,5).join(' ')+'</b><br>';
  if(accuracy>=80 && completeness>=80 && fluency>=80)
    tips += '✅ 발음이 정확합니다!';
  else if(accuracy<50)
    tips += '💡 천천히 또박또박 다시 말해보세요';
  else if(completeness<70)
    tips += '💡 문장을 끝까지 말해보세요';
  else if(fluency<70)
    tips += '💡 단어 순서에 주의하세요';

  if(tips) feedback += '<div style="margin-top:5px;font-size:10px;color:var(--text2)">'+tips+'</div>';
  // 인식된 말 표시 (항상)
  if(said && said.trim()){
    feedback += '<div style="margin-top:4px;font-size:10px;color:var(--text3)">📢 인식됨: "'+esc(said)+'"</div>';
  } else {
    feedback += '<div style="margin-top:4px;font-size:10px;color:var(--accent2)">⚠️ 음성이 인식되지 않았습니다 — 더 크게, 천천히 말해보세요</div>';
  }
  return {html: feedback, cls};
}

// ── API 키 저장/로드 ──────────────────────────────────
function saveApiKey(key){
  try{
    localStorage.setItem('langAppApiKey', btoa(unescape(encodeURIComponent(key))));
  }catch(e){
    try{ localStorage.setItem('langAppApiKey', key); }catch(e2){}
  }
}

function loadApiKey(){
  try{
    const stored = localStorage.getItem('langAppApiKey');
    if(!stored) return '';
    try{ return decodeURIComponent(escape(atob(stored))); }
    catch(e){ return stored; }
  }catch(e){ return ''; }
}

        ' · <a href="#" onclick="testApiConnection()" style="color:var(--accent3)">🔍 연결 테스트</a>'+

        '<button class="word-search-btn" id="wordSearchBtn"'+(_wordSearchInProgress?' disabled style="opacity:.5"':'')+'>'+(_wordSearchInProgress?'🔄 검색 중...':'🔍 번역')+'</button>'+

// 저장 패널 열기/닫기
function toggleSavedPanel(){
  const body = document.getElementById('savedWordsBody');
  const icon = document.getElementById('savedToggleIcon');
  if(!body) return;
  const open = body.classList.toggle('open');
  if(icon) icon.textContent = open ? '▲' : '▼';
}

// 저장된 단어 불러오기
function loadSavedWord(idx){
  const item = _wordSavedList[idx];
  if(!item || !item.data) return;
  _wordDataCache  = item.data;
  _wordInputCache = item.word;
  const wi = document.getElementById('wordInput');
  if(wi) wi.value = item.word;
  renderWordResult(item.data);
  showToast('📖 "'+item.word+'" 불러옴');
}

// 즐겨찾기 토글
function togglePinWord(idx){
  if(!_wordSavedList[idx]) return;
  _wordSavedList[idx].pinned = !_wordSavedList[idx].pinned;
  // 즐겨찾기 단어를 앞으로
  _wordSavedList.sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0));
  saveWordList();
  refreshSavedPanel();
  showToast(_wordSavedList[idx]?(_wordSavedList[idx].pinned?'📌 즐겨찾기 추가':'☆ 즐겨찾기 해제'):'');
}

// 단어 삭제
function deleteSavedWord(idx){
  const word = _wordSavedList[idx]?.word;
  _wordSavedList.splice(idx, 1);
  saveWordList();
  refreshSavedPanel();
  if(word) showToast('"'+word+'" 삭제됨');
}

// 저장 목록 패널 갱신
function refreshSavedPanel(){
  const body = document.getElementById('savedWordsBody');
  const cnt  = document.getElementById('savedCount');
  if(!body) return;
  if(!_wordSavedList.length){
    body.innerHTML='<div class="saved-words-empty">저장된 단어가 없습니다</div>';
  } else {
    body.innerHTML = _wordSavedList.map((item,i)=>{
      const pinIcon = item.pinned ? '📌' : '☆';
      const d = item.date ? new Date(item.date).toLocaleDateString('ko-KR',{month:'short',day:'numeric'}) : '';
      const enMeaning = (item.data && item.data.languages)
        ? (item.data.languages.find(l=>l.lang==='en')||{}).meaning||'' : '';
      return '<div class="saved-word-item" onclick="loadSavedWord('+i+')" id="swi_'+i+'">'+
        '<span class="swi-word">'+esc(item.word)+'</span>'+
        '<span class="swi-meaning">'+esc(enMeaning||item.word)+'</span>'+
        '<span class="swi-date">'+esc(d)+'</span>'+
        '<span class="swi-actions" onclick="event.stopPropagation()">'+
          '<button class="swi-btn swi-pin'+(item.pinned?' pinned':'')+'" onclick="togglePinWord('+i+')">'+pinIcon+'</button>'+
          '<button class="swi-btn swi-del" onclick="deleteSavedWord('+i+')">✕</button>'+
        '</span>'+
      '</div>';
    }).join('');
  }
  if(cnt) cnt.textContent = _wordSavedList.length+'개';
}

      "meaning": "한국어 뜻",
      "sentences": [{"original": "예문", "reading": "한글로 읽는 발음", "romanization": "로마자", "meaning": "한국어 뜻"}]
    }
  ]
}
언어: en(영어), jp(일본어 — reading은 한글발음, romanization은 로마자), la(라틴어 — reading은 한글발음).
매우 중요: reading 필드에는 반드시 한국어(한글)로 어떻게 읽는지 표기하세요. 예: love→"러브", 愛→"아이/あい". sentences는 각 언어 1개, 8단어 이내 일상 문장.`;

  try{
    const response = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + savedKey
      },
      body: JSON.stringify({
        model: 'gpt-4o-mini',
        max_tokens: 3000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if(!response.ok){
      const err = await response.json().catch(()=>({error:{message:response.statusText}}));
      throw new Error('API 오류 '+response.status+': '+(err.error?.message||response.statusText));
    }

    const data = await response.json();
    const text = data.choices[0].message.content;
    const jsonMatch = text.match(/\{[\s\S]*\}/);
    if(!jsonMatch) throw new Error('번역 결과 형식 오류');
    const parsed = JSON.parse(jsonMatch[0]);

    renderWordResult(parsed);

    // 캐시 + localStorage 저장
    _wordDataCache  = parsed;
    _wordInputCache = wordSafe;

    // 저장 목록에 추가 (중복 제거 → 맨 앞 → 최대 50개)
    _wordSavedList = _wordSavedList.filter(x=>x.word !== wordSafe);
    _wordSavedList.unshift({ word: wordSafe, data: parsed, date: Date.now(), pinned: false });
    if(_wordSavedList.length > 50) _wordSavedList = _wordSavedList.slice(0, 50);

    try{
      localStorage.setItem('lastWordData',  JSON.stringify(parsed));
      localStorage.setItem('lastWordInput', wordSafe);
      localStorage.setItem('wordSavedList', JSON.stringify(_wordSavedList));
      localStorage.setItem('wordHistory',   JSON.stringify(wordHistory));
    }catch(e){}

    // 저장 목록 패널 갱신 (단어장 탭에 있을 때)
    refreshSavedPanel();

    // PT 단어뱅크 저장
    ptSaveToWordBank(parsed, wordSafe);

  }catch(err){
    resultEl.innerHTML =
      '<div style="color:var(--accent2);padding:20px;text-align:center">'+
      '오류: '+esc(err.message)+'<br>'+
      '<span style="font-size:11px;color:var(--text3)">API 키를 확인하거나 다시 시도하세요</span>'+
      '</div>';
  }finally{
    // 성공/실패 어느 경우든 검색 가드와 버튼 상태를 반드시 복원
    _wordSearchInProgress = false;
    const btnEl = document.getElementById('wordSearchBtn');
    if(btnEl){ btnEl.disabled = false; btnEl.style.opacity = '1'; }
  }
}

function ptQuickTrainFromBtn(btn){
  if(!btn) return;
  ptQuickTrain(
    btn.dataset.ptWord || '',
    btn.dataset.ptMeaning || '',
    btn.dataset.ptSentence || '',
    btn.dataset.ptReading || '',
    btn.dataset.ptLang || 'en',
    btn.dataset.ptTts || 'en-US'
  );
}

function ptQuickTrain(word, meaning, sentence, reading, lang, ttsLang){
  if(!word) return;
  lang = lang || 'en';
  ttsLang = ttsLang || 'en-US';
  const ipa = reading ? (reading.includes('[')?reading.split('[').slice(1).join('[').replace(']',''):'') : '';

  // 언어별 기본 예문/팁
  const langCfg = ALPHA_PT_CONFIG[lang] || ALPHA_PT_CONFIG.en;
  const defaultSentence = {
    en: 'I use the word '+word+'.',
    jp: word+'を つかいます。',
    la: word+' est verbum.'
  }[lang] || (word+'.');

  const entry = {
    w: word, ipa: ipa?'['+ipa+']':'', ko: meaning, stress:0,
    sentence: sentence||defaultSentence,
    sentKo: reading||'', shadow: sentence?sentence.replace(/[.!?,、。]/g,''):word,
    tips: langCfg.tips || {stress:'강세 확인',liaison:'자연스럽게 이어서',intonation:sentence&&sentence.includes('?')?'의문문 → 끝 올림':'평서문 → 끝 내림'},
    fromWordTab:true, lang:lang, ttsLang:ttsLang
  };
  _ptWordBank = [entry, ..._ptWordBank.filter(x=>x.w!==word)].slice(0,20);
  try{localStorage.setItem('ptWordBank',JSON.stringify(_ptWordBank));}catch(e){}
  ptUseWordBank=true; ptWrong=[];
  ptQueue=[entry]; ptCurrent=null; ptStep=0;
  _ptQueuePrepared = true; // renderPronTrainer가 큐를 덮어쓰지 않도록 표시
  // PT 탭으로 이동
  switchLang('pt');
  showToast('🎯 "'+word+'" ('+langCfg.name+') 발음 훈련 시작!');
}

function ptSaveToWordBank(parsed, koWord){
  if(!parsed||!parsed.languages) return;

  // 영어·일본어·라틴어 각 언어 단어를 모두 단어뱅크에 저장
  const ttsMap = {en:'en-US', jp:'ja-JP', la:'la'};
  ['en','jp','la'].forEach(langCode=>{
    const langData = parsed.languages.find(l=>l.lang===langCode);
    if(!langData || !langData.word) return;

    const sent = langData.sentences&&langData.sentences[0] ? langData.sentences[0].original : '';
    const sentReading = langData.sentences&&langData.sentences[0] ? (langData.sentences[0].reading||'') : '';
    const ipa = langData.ipa || (langData.reading&&langData.reading.includes('[') ? '['+langData.reading.split('[').slice(1).join('[') : '');
    const langCfg = ALPHA_PT_CONFIG[langCode] || ALPHA_PT_CONFIG.en;

    const entry = {
      w: langData.word,
      ipa: ipa || '',
      ko: langData.meaning || koWord,
      stress: 0,
      sentence: sent || langData.word,
      sentKo: sentReading || langData.reading || '',
      shadow: sent ? sent.replace(/[.!?,、。]/g,'') : langData.word,
      tips: langCfg.tips || {stress:'강세 확인', liaison:'자연스럽게 이어서', intonation:'평서문 → 끝 내림'},
      fromWordTab: true,
      koWord: koWord,
      lang: langCode,
      ttsLang: ttsMap[langCode] || 'en-US'
    };

    _ptWordBank = _ptWordBank.filter(x=>!(x.w===entry.w && x.lang===langCode));
    _ptWordBank.unshift(entry);
  });

  if(_ptWordBank.length>30) _ptWordBank=_ptWordBank.slice(0,30);
  try{ localStorage.setItem('ptWordBank', JSON.stringify(_ptWordBank)); }catch(e){}
}

function ptLoadWordBank(){
  try{
    const saved = localStorage.getItem('ptWordBank');
    if(saved) _ptWordBank = JSON.parse(saved);
  }catch(e){ _ptWordBank=[]; }
}

  la: {ttsLang:'la',     name:'라틴어',  tips:{stress:'장단음 강세 위치', liaison:'V=[w] 발음', intonation:'고전식 억양'}},
};

function alphaQuickTrain(){
  if(!selectedChar) return;
  const lang = selectedChar.lang;
  const cfg  = ALPHA_PT_CONFIG[lang];
  if(!cfg){ showToast('이 언어는 PT 연동 준비 중입니다'); return; }

  const ch = selectedChar;
  const speakWord = ch.speakText || ch.c;
  // r 필드에서 한글 발음 추출
  const rFull = ch.r||'';
  const koMatch = rFull.match(/^([가-힣\/]+)/);
  const ipa = koMatch ? rFull : ('['+rFull.replace(/[가-힣\/\s]+/g,'').trim()+']');

  // 예문: t 필드에서 추출
  const tText = ch.t||'';
  const exLine = tText.split('\\n').find(l=>l.includes('예:')) || '';
  const exMatch = exLine.match(/예:\s*([^\n(]+)/);
  const sentence = exMatch ? exMatch[1].trim().split('(')[0].trim() : speakWord;

  const entry = {
    w:       speakWord,
    ipa:     ipa,
    ko:      ch.m || cfg.name+' 문자',
    stress:  0,
    sentence: sentence,
    sentKo:  '',
    shadow:  sentence.replace(/[.!?,。、]/g,''),
    tips:    cfg.tips,
    fromAlpha: true,
    lang:    lang,
    ttsLang: cfg.ttsLang,
  };

  // 단어뱅크에 추가
  _ptWordBank = [entry, ..._ptWordBank.filter(x=>x.w!==entry.w)].slice(0,20);
  try{ localStorage.setItem('ptWordBank', JSON.stringify(_ptWordBank)); }catch(e){}

  // PT 탭으로 이동 및 즉시 훈련
  ptUseWordBank = true;
  ptWrong = [];
  ptQueue = [entry];
  ptCurrent = null;
  ptStep = 0;
  switchLang('pt');
  showToast('🎯 '+speakWord+' — '+cfg.name+' 발음 훈련 시작!');
}

// ── PT 상태 변수 ──────────────────────────────────────
let ptLevel = 1;
let ptUseWordBank = false; // 단어장 모드 여부
let ptQueue = [];          // 현재 레벨 단어 큐
let ptCurrent = null;      // 현재 단어
let ptStep = 0;            // 현재 단계 (0~7)
let ptScores = {};         // 현재 단어 점수

const PT_STEPS = ['카드','듣기','녹음','점수','교정','쉐도잉','문장','복습'];

// ── 렌더링 ────────────────────────────────────────────
function renderPronTrainer(){
  const main = document.getElementById('mainContent');
  main.innerHTML = `
  <div class="pt-wrap">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div style="font-size:16px;font-weight:900;color:var(--text)">🎯 발음 트레이너</div>
      <div id="ptLangBadge" style="font-size:11px;color:var(--text3)">원어민 수준 발음 훈련</div>
    </div>

    <div class="pt-level-bar" style="flex-wrap:wrap;gap:4px">
      <span class="pt-level-label">내장:</span>
      ${Object.keys(PT_WORDS).map(lv=>
        `<button class="pt-level-btn${parseInt(lv)===ptLevel&&!ptUseWordBank?' active':''}" onclick="ptSetLevel(${lv})">Lv${lv}</button>`
      ).join('')}
      <button class="pt-level-btn${ptUseWordBank?' active':''}"
        onclick="ptSetWordBankMode()"
        style="${_ptWordBank.length?'border-color:var(--accent3);color:var(--accent3)':'opacity:.5'}">

    </div>
    <!-- 메인 콘텐츠 -->
    <div id="ptMain"></div>
  </div>`;

  // ptQuickTrain 등에서 큐를 이미 준비한 경우(_ptQueuePrepared) 재초기화 건너뜀
  if(_ptQueuePrepared){
    _ptQueuePrepared = false;
    ptNextWord();
  } else {
    ptInitQueue();
    ptNextWord();
  }
}

function ptSetLevel(lv){
  ptLevel = lv;
  ptUseWordBank = false;
  ptWrong = [];
  renderPronTrainer();
}

function ptSetWordBankMode(){
  if(!_ptWordBank.length){
    showToast('단어장에서 먼저 단어를 검색하세요!');
    return;
  }
  ptUseWordBank = true;
  ptWrong = [];
  renderPronTrainer();
}

function ptInitQueue(){
  let words;
  if(ptUseWordBank && _ptWordBank.length){
    words = _ptWordBank;
    // 단어뱅크 단어는 셔플
  } else {
    words = PT_WORDS[ptLevel] || PT_WORDS[1];
  }
  ptQueue = [...words].sort(()=>Math.random()-.5);
  ptCurrent = null;
  ptStep = 0;
}

function ptNextWord(){
  if(ptQueue.length === 0){
    ptShowComplete();
    return;
  }
  ptCurrent = ptQueue.shift();
  ptStep = 0;
  ptScores = {accuracy:0, stress:0, liaison:0, intonation:0};
  ptListenCount = 0;
  ptShowStep();
}

function ptUpdateStepBar(){
  PT_STEPS.forEach((_,i)=>{
    const el = document.getElementById('ptStep'+i);
    if(!el) return;
    el.className = 'pt-step ' + (i < ptStep ? 'done' : i === ptStep ? 'active' : '');
  });
}

// ── 각 단계 렌더 ──────────────────────────────────────
function ptShowStep(){
  ptUpdateStepBar();
  const w = ptCurrent;
  switch(ptStep){
    case 0: ptShowCard(w); break;
    case 1: ptShowListen(w); break;
    case 2: ptShowRecord(w); break;
    case 3: ptShowScore(w); break;
    case 4: ptShowCorrection(w); break;
    case 5: ptShowShadowing(w); break;
    case 6: ptShowSentence(w); break;
    case 7: ptShowWordReview(w); break;
  }
}

function ptListen(){
  window.speechSynthesis.cancel();
  const ptLang = (ptCurrent.ttsLang)||'en-US';
  const utt = new SpeechSynthesisUtterance(ptCurrent.w);
  utt.lang=ptLang; utt.rate=0.85; utt.pitch=1.0; utt.volume=1.0;
  const vs = window.speechSynthesis.getVoices();
  const voice = vs.find(v=>v.lang===ptLang&&v.name.includes('Google'))||vs.find(v=>v.lang===ptLang)||vs.find(v=>v.lang.startsWith(ptLang.split('-')[0]))||vs[0];
  if(voice) utt.voice=voice;
  window.speechSynthesis.speak(utt);
  ptListenCount++;
  const cnt = document.getElementById('ptListenCnt');
  if(cnt) cnt.textContent = ptListenCount+'회';
  const next = document.getElementById('ptListenNext');
  if(next && ptListenCount>=1){ next.style.opacity='1'; }
}

function ptToggleRecord(){
  if(ptRecording){ ptStopRecord(); return; }
  ptStartRecord();

function ptStartRecord(){
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ alert('Chrome/Edge에서 사용해주세요'); return; }

  ptRec = new SR();
  const recLang=(ptCurrent&&ptCurrent.ttsLang)||'en-US';
  ptRec.lang=recLang; ptRec.interimResults=true; ptRec.maxAlternatives=5;

  ptRec.onstart=()=>{
    ptRecording=true;
    const btn=document.getElementById('ptRecBtn');
    if(btn){btn.classList.add('recording');btn.textContent='⏹ 중지';}
    const st=document.getElementById('ptRecStatus');
    if(st) st.textContent='🔴 녹음 중... 발음해주세요';
    // 주파수 분석 시작
    startFreqAnalysis('ptFreqPanel', (ptCurrent&&ptCurrent.ttsLang)||'en-US');
  };

  ptRec.onresult=e=>{
    const said = Array.from(e.results[0]).map(x=>x.transcript.trim())[0]||'';
    const res=document.getElementById('ptRecResult');
    if(res) res.textContent='인식: "'+said+'"';
    if(e.results[0].isFinal){
      ptAnalyze(said);
    }
  };

  ptRec.onerror=e=>{
    ptStopRecord();
    const st=document.getElementById('ptRecStatus');
    if(st) st.textContent='오류: '+e.error+' — 다시 시도하세요';
  };

  ptRec.onend=()=>{ ptRecording=false; };

  // SR 직접 시작 (getUserMedia 미사용 → 마이크 충돌 방지)
  try{
    ptRec.start();
  }catch(e){
    const st=document.getElementById('ptRecStatus');
    if(st) st.textContent='🔒 마이크 오류: '+e.message+' — 브라우저 마이크 권한을 확인하세요';
  }
}

function ptStopRecord(){
  ptRecording=false;
  stopFreqAnalysis();
  if(ptRec){try{ptRec.stop();}catch(e){} ptRec=null;}
  const btn=document.getElementById('ptRecBtn');
  if(btn){btn.classList.remove('recording');btn.textContent='🎤 발음하기';}
}

// ── 4단계 발음 분석 ──────────────────────────────────
function ptAnalyze(said){
  ptStopRecord();
  const w = ptCurrent;
  // PT: 비라틴 문자면 로마자로 비교
  const ptOrig = w.w;
  const ptIsNonLatin = /[^\u0000-\u007F]/.test(ptOrig) && !/[a-zA-Z]/.test(ptOrig);
  const ptCompare = ptIsNonLatin ? (w.ipa||ptOrig).replace(/[\[\]\/]/g,'').trim() : ptOrig;
  const detail = calcPronDetail(ptCompare, said, (w.ttsLang)||'en-US');

  // 언어별 강세·연음·억양 점수
  const ptLangCode = w.ttsLang || 'en-US';
  const stressScore     = calcStressScore(said, w.w, w.stress, ptLangCode);
  const liaisonScore    = calcLiaisonScore(said, w.w, ptLangCode);
  const intonationScore = calcIntonationScore(said, w.sentence, ptLangCode);

  ptScores = {
    accuracy: detail.score,
    stress: stressScore,
    liaison: liaisonScore,
    intonation: intonationScore
  };

  // 오답 처리
  const avg = Math.round((detail.score+stressScore+liaisonScore+intonationScore)/4);
  if(avg < 70 && !ptWrong.find(x=>x.w===w.w)) ptWrong.push({...w, said, avg});

  ptStep = 3;
  ptShowStep();
}

// ── 언어별 발음 평가 엔진 ──────────────────────────

// 강세 점수 (언어별 강세 패턴 반영)
function calcStressScore(said, target, stressIdx, ttsLang){
  if(!said) return 50;
  const lang = (ttsLang||'en-US').split('-')[0];
  const s = said.toLowerCase().replace(/[^a-z\u3040-\u30ff\u4e00-\u9fff\u0900-\u097f]/g,'');
  const t = target.toLowerCase();

  // 일본어: 음절 수 일치 = 높은 점수 (일본어는 박자 기반)
  if(lang==='ja'){
    const moraT = t.replace(/[っッ]/g,'x').length;
    const moraS = s.length;
    const diff = Math.abs(moraT - moraS);
    return diff===0 ? 95 : diff===1 ? 82 : diff===2 ? 68 : 55;
  }
  // 중국어: 성조 마커 없어도 음절 구조 일치
  if(lang==='zh'){
    const sylT = t.replace(/[^a-z]/g,'').split(/[aeiouüāáǎàēéěèīíǐìōóǒòūúǔùǖǘǚǜ]+/).filter(Boolean).length;
    const sylS = s.split(/[aeiou]+/).filter(Boolean).length;
    return Math.abs(sylT-sylS)<=1 ? 88 : 68;
  }
  // 독일어/프랑스어: 어근 강세
  if(lang==='de'||lang==='fr'){
    if(s.includes(t.slice(0,4))) return 90;
    if(editDist(s,t)<=2) return 82;
    return 68;
  }
  // 힌디어/벵골어/타밀어/산스크리트: 음절 수 기반
  if(['hi','bn','ta','sa'].includes(lang)){
    if(s.length>0 && Math.abs(s.length-t.length)<=2) return 85;
    return 65;
  }
  // 라틴어: 장단음 기반
  if(lang==='la'){
    if(editDist(s,t)<=1) return 92;
    if(editDist(s,t)<=2) return 78;
    return 62;
  }
  // 영어 기본
  const sylT2 = t.split(/[aeiou]+/).filter(Boolean).length;
  const lenMatch = Math.abs(s.split(/[aeiou]+/).filter(Boolean).length - sylT2)<=1;
  if(s.includes(t.slice(0,3))) return lenMatch ? 88 : 72;
  return 65;
}

// 연음 점수 (언어별 연음 패턴)
function calcLiaisonScore(said, target, ttsLang){
  if(!said) return 55;
  const lang = (ttsLang||'en-US').split('-')[0];
  const s = said.toLowerCase().replace(/\s/g,'');
  const t = target.toLowerCase().replace(/\s/g,'');

  // 일본어: 촉음(っ), 장음 등 연음 고려
  if(lang==='ja'){
    const sH = toHiragana ? toHiragana(s) : s;
    const tH = toHiragana ? toHiragana(t) : t;
    if(sH===tH) return 98;
    if(sH.includes(tH)||tH.includes(sH)) return 88;
    return editDist(sH,tH)<=2 ? 75 : 60;
  }
  // 중국어: 성조 무시 비교
  if(lang==='zh'){
    const sC = stripTones ? stripTones(s) : s;
    const tC = stripTones ? stripTones(t) : t;
    if(sC===tC) return 95;
    return editDist(sC,tC)<=2 ? 80 : 62;
  }
  // 프랑스어: 연음(liaison) 특성
  if(lang==='fr'){
    if(s===t) return 95;
    if(s.includes(t)||t.includes(s)) return 88;
    return editDist(s,t)<=2 ? 78 : 62;
  }
  // 기본
  if(s===t) return 95;
  if(s.includes(t)||t.includes(s)) return 88;
  return editDist(s,t)<=2 ? 78 : 60;
}

// 억양 점수 (언어별 억양 특성)
function calcIntonationScore(said, sentence, ttsLang){
  if(!said||said.length<1) return 50;
  const lang = (ttsLang||'en-US').split('-')[0];
  const s = said.trim();
  const isQ = (sentence||'').includes('?');

  // 발음이 인식됐으면 기본 점수 부여
  let base = s.length > 0 ? 72 : 50;

  // 언어별 보정
  if(lang==='ja')  base = 78;  // 일본어는 억양 단순
  if(lang==='zh')  base = 70;  // 중국어는 성조로 억양
  if(lang==='fr')  base = isQ ? 80 : 75;
  if(lang==='de')  base = 76;
  if(lang==='hi')  base = 72;
  if(lang==='la')  base = 74;

  // 단어 길이 기반 추가 점수
  if(s.length >= 3) base += 5;
  if(s.length >= 6) base += 3;

  return Math.min(95, base);
}

// 언어별 맞춤 발음 교정 가이드

  const lang = (ttsLang||'en-US').split('-')[0];

  // 정확도 낮을 때

      zh: ['성조 4개를 먼저 확인하세요','병음(한어병음)을 소리 내어 읽어보세요','zh/ch/sh vs z/c/s 차이에 주의'],
      fr: ['R은 목구멍에서 굴려서 발음','어말 자음은 대부분 묵음','비음(an/in/on)을 코로 내뱉어보세요'],
      de: ['ch는 목구멍에서 흐/히','어말 b→p, d→t 무성화','움라우트 ä/ö/ü는 입술 모양이 핵심'],
      hi: ['유기음(kh/gh)은 숨을 확 내뱉어야','권설음(ṭ/ḍ)은 혀를 말아올려서','데바나가리는 적힌 대로 발음'],
      bn: ['첫 음절을 강하게 발음','유기음과 무기음 구별 필수','অ=[ɔ] 는 한국어 어/오 중간'],
      ta: ['타밀어 ழ[ɻ]는 혀를 뒤로 굴려','장단음 구별이 중요 (a vs ā)','권설음 ட/ண은 혀를 말아서'],
      sa: ['장단음 구별 필수 (ā=2배 길게)','산디(연성)규칙: 단어 경계에서 발음 변화','리탈음 ṛ[r̩]는 음절 단위'],
      la: ['V=[w] 발음 (위타, 벨류X)','C는 항상 [k] — Caesar=카이사르','AE=[아이] 이중모음에 주의'],
      en: ['입 모양을 크게 열어보세요','자음 끝을 또렷하게 발음','강세 음절을 더 강하고 길게'],
      ta: ['타밀어 ழ[ɻ]는 혀를 뒤로 굴려서','장단음 구별이 뜻을 바꿈 (a≠ā)','권설음 ட/ண은 혀를 위로 말아서'],
      sa: ['장단음 구별 필수 — ā는 2배 길게','산디(연성) 규칙 주의','모든 자음 그룹을 5개씩 묶어 연습'],
      la: ['V는 [w] 발음 — vita=위타','C는 항상 [k] — Caesar=카이사르','AE=[아이] 이중모음에 주의'],
    };
    const g = guidemap[lang] || guidemap.en;
    tips.push(...g.slice(0,2).map(t=>'🔤 '+t));
  }

  // 강세 낮을 때
  if(scores.stress < 72){
    const stressmap = {
      ja: '각 음절을 동일한 박자로 (모라 박자)',
      zh: '성조: 1성=높평, 2성=올림, 3성=내렸다올림, 4성=내림',
      fr: '마지막 음절에 강세 (영어와 반대!)',
      de: '첫 음절이나 어근에 강세',
      hi: '유기음 자음 뒤 모음을 강하게',
      la: '장모음이 있는 음절에 강세',
      ta: '첫 음절 강하게 (드라비다어 계열)',
      sa: '장모음 음절에 강세 (베다 악센트)',
      bn: '첫 음절을 강하게',
    };
    const sg = stressmap[lang] || '강세 음절을 더 강하고 길게';
    tips.push('💪 강세: '+sg);
  }

  // 억양 낮을 때
  if(scores.intonation < 72){
    const intonemap = {
      ja: '일본어는 고저 악센트 — 도쿄 방언 기준',
      zh: '성조가 곧 억양! 성조 정확도가 핵심',
      fr: '평서문 끝 내림 / 의문문 끝 올림',
      de: '동사 위치를 강조해서 읽기',
      hi: '문장 끝이 약간 올라가는 패턴',
      la: '강세 음절에서 피치 올림',
      ta: '타밀어는 끝이 올라가는 경향',
      sa: '베다 억양 3종류: 우다타/아누다타/스와리타',
      bn: '문장 끝이 약간 올라가는 패턴',
    };
    const ig = intonemap[lang] || '문장의 흐름을 살려서 자연스럽게';
    tips.push('📈 억양: '+ig);
  }

  return tips;
}

function ptStartShadowing(words){
  if(ptShadowTimer) clearTimeout(ptShadowTimer);
  ptShadowIdx = 0;
  const btn = document.getElementById('ptShadowBtn');
  if(btn) btn.disabled=true;

  const playWord = ()=>{
    if(ptShadowIdx >= words.length){
      const st=document.getElementById('ptShadowStatus');
      if(st) st.textContent='✅ 완료! 한 번 더 하려면 다시 시작을 누르세요';
      if(btn){btn.disabled=false;btn.textContent='🔄 다시';}
      return;
    }
    // 이전 단어 done
    if(ptShadowIdx>0){
      const prev=document.getElementById('sw'+(ptShadowIdx-1));
      if(prev){prev.className='pt-shadow-word done';}
    }
    // 현재 단어 current
    const cur=document.getElementById('sw'+ptShadowIdx);
    if(cur){cur.className='pt-shadow-word current';}

    const st=document.getElementById('ptShadowStatus');
    if(st) st.textContent='🎤 "'+words[ptShadowIdx]+'" 동시에 말하세요!';

    // TTS 재생
    window.speechSynthesis.cancel();
    const utt=new SpeechSynthesisUtterance(words[ptShadowIdx]);
    utt.lang='en-US'; utt.rate=0.8; utt.pitch=1.0;
    const vs=window.speechSynthesis.getVoices();
    const voice=vs.find(v=>v.lang==='en-US')||vs[0];
    if(voice) utt.voice=voice;
    utt.onend=()=>{
      ptShadowIdx++;
      ptShadowTimer=setTimeout(playWord, 600);
    };
    window.speechSynthesis.speak(utt);
  };
  playWord();
}

function ptSpeakSentence(){
  window.speechSynthesis.cancel();
  const sent = ptCurrent.sentence.replace(/\{|\}/g,'');
  const utt = new SpeechSynthesisUtterance(sent);
  utt.lang='en-US'; utt.rate=0.85;
  const vs=window.speechSynthesis.getVoices();
  const voice=vs.find(v=>v.lang==='en-US')||vs[0];
  if(voice) utt.voice=voice;
  window.speechSynthesis.speak(utt);
}

function ptRecordSentence(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR) return;
  const rec=new SR();
  rec.lang='en-US'; rec.maxAlternatives=3;
  const btn=document.getElementById('ptSentRecBtn');
  if(btn){btn.classList.add('recording');btn.textContent='⏹ 중지';}
  rec.onresult=e=>{
    const said=e.results[0][0].transcript;
    const target=ptCurrent.sentence.replace(/\{|\}/g,'');
    const d=calcPronDetail(target,said,'en-US');
    const res=document.getElementById('ptSentResult');
    if(res){
      const g=d.score>=85?'🟢 상':d.score>=65?'🟡 중':'🔴 하';
      res.innerHTML=`인식: "${esc(said)}" — <b>${g} ${d.score}점</b>`;
    }
    if(btn){btn.classList.remove('recording');btn.textContent='🎤 문장 말하기';}
  };
  rec.onerror=()=>{if(btn){btn.classList.remove('recording');btn.textContent='🎤 문장 말하기';}};
  navigator.mediaDevices.getUserMedia(AUDIO_CONSTRAINTS)
    .then(s=>{s.getTracks().forEach(t=>t.stop());rec.start();})
    .catch(()=>{});
}

      mid: ['성조가 조금 흔들렸어요 — 다시!','j/q/x는 혀끝을 아래 앞니에 대세요'],
      high: ['성조까지 완벽합니다!']
    },
    fr:{
      low: ['프랑스어 R은 목구멍에서 굴려서 발음해요','비음(an/en/in/on)을 코로 내뱉어보세요','어말 자음은 대부분 묵음입니다'],
      mid: ['거의 완벽해요! 연음(liaison)에 주의하세요','U(뤼) 발음은 입술을 동그랗게 하고 "이"'],
      high: ['Magnifique! 훌륭한 발음입니다!']
    },
    de:{
      low: ['독일어 ch는 목구멍에서 "흐"로 발음해요','어말 b→p, d→t, g→k 무성화에 주의','움라우트(ä/ö/ü)는 입술 모양이 핵심'],
      mid: ['거의 정확해요! 강세 위치를 확인하세요','r은 목구멍에서 굴려서 발음해요'],
      high: ['Wunderbar! 완벽한 발음입니다!']
    },
    hi:{
      low: ['힌디어는 유기음(kha/gha)과 무기음(ka/ga) 구별이 중요','권설음(ṭa/ḍa)은 혀를 말아올려서 발음','데바나가리는 소리 나는 대로 적어요 — 발음 규칙적!'],
      mid: ['기식음(h) 부분을 더 강하게 내뱉어보세요','나마스테처럼 단어 전체를 발음해보세요'],
      high: ['बहुत अच्छा! 아주 훌륭합니다!']
    },
    la:{
      low: ['라틴어 V는 [w] 발음이에요 (Vita=위타)','C는 항상 [k] — Caesar=카이사르','이중모음 AE=[아이]를 기억하세요'],
      mid: ['거의 정확해요! 장단음에 주의하세요','강세는 뒤에서 두 번째 음절이 기본'],
      high: ['Optime! 완벽한 발음입니다!']
    },
  };
  const langTips = tips[lang] || tips[lang.split('-')[0]] || {
    low:['천천히 또박또박 말해보세요','듣기 버튼으로 원음을 충분히 들으세요','입 모양을 크게 열어보세요'],
    mid:['조금 더 연습해보세요','원어민 발음과 비교해보세요'],
    high:['훌륭한 발음입니다!','원어민 수준에 가깝습니다!']
  };
  const arr = score>=85 ? langTips.high : score>=60 ? langTips.mid : langTips.low;
  return arr[Math.floor(Math.random()*arr.length)];
}

// 이력 추가 및 패널 업데이트
function addSpeakHistory(said, score, grade, lang, ch){
  const round = _speakHistory.length + 1;
  _speakHistory.push({round, said, score, grade});

  const hist = document.getElementById('speakHistory');
  const body = document.getElementById('shBody');
  const summ = document.getElementById('shSummary');
  if(!hist||!body) return;

  hist.classList.add('open');

  const gradeEmoji = grade==='상'?'🟢':grade==='중'?'🟡':'🔴';
  const item = document.createElement('div');
  item.className = 'sh-item';
  item.innerHTML =
    '<span class="sh-round">'+round+'회</span>'+
    '<span class="sh-grade">'+gradeEmoji+'</span>'+
    '<span class="sh-said">"'+esc(said)+'"</span>'+
    '<span class="sh-score">'+score+'점</span>';
  body.appendChild(item);
  body.scrollTop = body.scrollHeight;

  // 교정 팁 표시
  const tip = getPronTip(lang, ch, said, score);
  const tipEl = body.querySelector('.sh-tip');
  if(tipEl) tipEl.textContent = '💡 '+tip;
  else {
    const tipDiv = document.createElement('div');
    tipDiv.className = 'sh-tip';
    tipDiv.textContent = '💡 '+tip;
    body.appendChild(tipDiv);
  }

  // 요약 업데이트
  const avg = Math.round(_speakHistory.reduce((s,x)=>s+x.score,0)/_speakHistory.length);
  const topGrade = avg>=85?'🟢 상':avg>=60?'🟡 중':'🔴 하';
  if(summ) summ.textContent = round+'회 완료 | 평균 '+avg+'점 '+topGrade;
}

// 새 글자 선택 시 이력 초기화
function resetSpeakHistory(){
  _speakHistory = [];
  _speakAutoRound = 0;
  const body = document.getElementById('shBody');
  const summ = document.getElementById('shSummary');
  const hist = document.getElementById('speakHistory');
  if(body) body.innerHTML='';
  if(summ) summ.textContent='말하기 후 기록됩니다';
  if(hist) hist.classList.remove('open');
}

const LANG_FREQ_PROFILE_MAP = {
  'en-US': {f0:[100,200], vowel:[800,1200], cons:[2000,4000], label:'영어'},
  'ja-JP': {f0:[120,180], vowel:[700,1100], cons:[2500,4500], label:'일본어'},
  'zh-CN': {f0:[100,180], vowel:[750,1150], cons:[2000,3500], label:'중국어'},
  'fr-FR': {f0:[110,190], vowel:[700,1200], cons:[2000,4000], label:'프랑스어'},
  'de-DE': {f0:[100,170], vowel:[650,1100], cons:[2000,3800], label:'독일어'},
  'hi-IN': {f0:[130,220], vowel:[750,1200], cons:[2500,4500], label:'힌디어'},
  'ko-KR': {f0:[120,200], vowel:[700,1100], cons:[2000,4000], label:'한국어'},
  'bn-IN': {f0:[120,210], vowel:[720,1150], cons:[2200,4200], label:'벵골어'},
  'ta-IN': {f0:[125,215], vowel:[730,1160], cons:[2300,4300], label:'타밀어'},
};

// LANG_FREQ_PROFILE은 LANG_FREQ_PROFILE_MAP과 동일 (하위 호환)
const LANG_FREQ_PROFILE = LANG_FREQ_PROFILE_MAP;

let _freqAudioCtx  = null;
let _freqAnimId    = null;
let _freqStream    = null;
let _freqAnalyser  = null;
let _freqBuf       = null;

function getAudioCtx(){
  if(!_freqAudioCtx || _freqAudioCtx.state==='closed'){
    _freqAudioCtx = new (window.AudioContext||window.webkitAudioContext)();
  }
  if(_freqAudioCtx.state==='suspended') _freqAudioCtx.resume();
  return _freqAudioCtx;
}

function drawFreqCanvas(canvasId, dataArray, color, profile){
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width = canvas.offsetWidth || 280;
  const H = canvas.height = 48;
  ctx.clearRect(0,0,W,H);

  if(!dataArray){
    ctx.fillStyle = 'rgba(108,99,255,0.15)';
    const t = Date.now()/500;
    for(let i=0;i<W;i+=4){
      const h = Math.sin(i/30+t)*8+10;
      ctx.fillRect(i, H/2-h/2, 3, h);
    }
    return;
  }
  const barW = Math.max(1, W/dataArray.length*2);
  const gradient = ctx.createLinearGradient(0,H,0,0);
  gradient.addColorStop(0, (color||'#6c63ff')+'33');
  gradient.addColorStop(0.7,(color||'#6c63ff')+'aa');
  gradient.addColorStop(1,  (color||'#6c63ff'));
  ctx.fillStyle = gradient;
  for(let i=0;i<dataArray.length && i<W/2;i++){
    const val = dataArray[i]/255;
    const h   = val * H * 0.9;
    ctx.fillRect(i*barW, H-h, barW-1, h);
  }
}

function drawRefFreq(canvasId, profile){
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  const W = canvas.width = canvas.offsetWidth || 280;
  const H = canvas.height = 48;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  if(!profile) return;
  const gradient = ctx.createLinearGradient(0,H,0,0);
  gradient.addColorStop(0,'#10b98133');
  gradient.addColorStop(1,'#10b981');
  ctx.fillStyle = gradient;
  const bins = 128;
  for(let i=0;i<bins;i++){
    const freq = (i/bins)*8000;
    let amp = 0.05;
    if(freq>=profile.f0[0]  && freq<=profile.f0[1])   amp=0.6+Math.random()*0.2;
    if(freq>=profile.vowel[0]&& freq<=profile.vowel[1]) amp=0.5+Math.random()*0.3;
    if(freq>=profile.cons[0] && freq<=profile.cons[1])  amp=0.3+Math.random()*0.2;
    ctx.fillRect((i/bins)*W, H-amp*H*0.85, W/bins-1, amp*H*0.85);
  }
  ctx.fillStyle='rgba(255,255,255,0.35)';
  ctx.font='8px sans-serif';
  if(profile.f0)    ctx.fillText('F0',   (profile.f0[0]/8000)*W+2,   H-3);
  if(profile.vowel) ctx.fillText('모음', (profile.vowel[0]/8000)*W+2, H-3);
  if(profile.cons)  ctx.fillText('자음', (profile.cons[0]/8000)*W+2,  H-3);
}

function addFreqPanel(containerId, langCode){
  const cont = document.getElementById(containerId);
  if(!cont || cont.querySelector('.freq-panel')) return;
  const profile = LANG_FREQ_PROFILE[langCode] || LANG_FREQ_PROFILE['en-US'];
  const panelId = 'fp_'+containerId;
  cont.insertAdjacentHTML('beforeend',
    '<div class="freq-panel active" id="'+panelId+'">'+
      '<div class="freq-row">'+
        '<span class="freq-label">🎤 내 목소리</span>'+
        '<div class="freq-canvas-wrap"><canvas id="fc_my_'+containerId+'" class="freq-canvas"></canvas></div>'+
        '<span class="freq-score" id="fs_my_'+containerId+'" style="color:var(--accent)">-</span>'+
      '</div>'+
      '<div class="freq-row">'+
        '<span class="freq-label">🔊 원어민</span>'+
        '<div class="freq-canvas-wrap"><canvas id="fc_ref_'+containerId+'" class="freq-canvas"></canvas></div>'+
        '<span class="freq-score" id="fs_ref_'+containerId+'" style="color:var(--accent3)">기준</span>'+
      '</div>'+
      '<div class="freq-note" id="fn_'+containerId+'">말하기 버튼을 누르면 실시간 분석 시작</div>'+
      '<div id="fq_'+containerId+'"></div>'+
    '</div>'
  );
  drawRefFreq('fc_ref_'+containerId, profile);
}

async function startFreqAnalysis(containerId, langCode){
  stopFreqAnalysis();
  try{
    _freqStream = await navigator.mediaDevices.getUserMedia({audio:true});
    const audioCtx = getAudioCtx();
    const source   = audioCtx.createMediaStreamSource(_freqStream);
    _freqAnalyser  = audioCtx.createAnalyser();
    _freqAnalyser.fftSize = 256;
    _freqAnalyser.smoothingTimeConstant = 0.8;
    source.connect(_freqAnalyser);
    _freqBuf = new Uint8Array(_freqAnalyser.frequencyBinCount);

    const profile  = LANG_FREQ_PROFILE[langCode] || LANG_FREQ_PROFILE['en-US'];
    const noteEl   = document.getElementById('fn_'+containerId);
    const scoreEl  = document.getElementById('fs_my_'+containerId);
    const qualEl   = document.getElementById('fq_'+containerId);

    // 이어폰 감지
    if(qualEl){
      const tracks   = _freqStream.getAudioTracks();
      const settings = tracks[0]?.getSettings() || {};
      const sr       = settings.sampleRate || 0;
      const badge    = sr>=44100
        ? '<span class="audio-quality aq-good">✅ 고품질 마이크</span>'
        : sr>=16000
          ? '<span class="audio-quality aq-ok">⚡ 일반 마이크</span>'
          : '<span class="audio-quality aq-bad">⚠️ 저품질</span>';
      qualEl.innerHTML = badge;
    }

    const draw = ()=>{
      if(!_freqAnalyser) return;
      _freqAnimId = requestAnimationFrame(draw);
      _freqAnalyser.getByteFrequencyData(_freqBuf);
      drawFreqCanvas('fc_my_'+containerId, _freqBuf, '#6c63ff', profile);

      // 볼륨 계산
      const vol = Math.round(_freqBuf.reduce((s,v)=>s+v,0)/_freqBuf.length/255*100);
      if(scoreEl){ scoreEl.textContent=vol+'%'; scoreEl.style.color=vol>30?'var(--accent3)':'var(--accent2)'; }
      if(noteEl){ noteEl.textContent='볼륨: '+vol+'%' + (vol<10?' — 더 크게 말하세요':''); }
    };
    draw();
  }catch(e){
    const noteEl = document.getElementById('fn_'+containerId);
    if(noteEl) noteEl.textContent='마이크 접근 실패: '+e.message;
  }
}

function stopFreqAnalysis(){
  if(_freqAnimId){ cancelAnimationFrame(_freqAnimId); _freqAnimId=null; }
  if(_freqStream){ _freqStream.getTracks().forEach(t=>t.stop()); _freqStream=null; }
  _freqAnalyser=null; _freqBuf=null;
}

function toggleStrategyCard(sid){
  const desc = document.getElementById(sid+'_desc');
  const card = document.getElementById(sid);
  if(!desc||!card) return;
  const isOpen = desc.style.display !== 'none';
  desc.style.display = isOpen ? 'none' : 'block';
  // 제목의 힌트 텍스트 업데이트
  const hint = card.querySelector('.s-title span');
  if(hint) hint.textContent = isOpen ? '탭하여 보기' : '접기';
  // 카드 배경 강조
  card.style.borderColor = isOpen ? 'var(--border)' : 'var(--accent)';
}

// UTILS
function setFeedback(msg,isError){const el=document.getElementById('feedbackMsg');if(!el)return;el.textContent=msg;el.className='feedback-msg'+(isError?' error':'');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
function esc(s){if(s===null||s===undefined)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
